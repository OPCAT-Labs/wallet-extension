name: Claude Interactive

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association)) ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.issue.author_association)) ||
      (github.event_name == 'issues' &&
        github.event.action == 'assigned' &&
        contains(github.event.issue.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.issue.author_association))
    uses: OPCAT-Labs/common-tools/.github/workflows/claude-interactive.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}