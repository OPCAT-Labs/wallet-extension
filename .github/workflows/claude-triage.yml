name: Claude Issue Triage

permissions:
  contents: read
  issues: write
  id-token: write

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    uses: OPCAT-Labs/common-tools/.github/workflows/claude-triage.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}