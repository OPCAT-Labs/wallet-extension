name: Auto Fix CI Failures

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write
  id-token: write

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      toJSON(github.event.workflow_run.pull_requests) != '[]' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch != github.event.repository.default_branch
    uses: OPCAT-Labs/common-tools/.github/workflows/claude-ci-fix.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
    with:
      allowed_tools: "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(yarn:*),Bash(gh pr view:*),Bash(gh pr list:*)"