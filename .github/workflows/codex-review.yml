name: Codex Code Review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  review:
    uses: OPCAT-Labs/common-tools/.github/workflows/codex-review.yml@main
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}